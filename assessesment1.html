<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script type="text/JavaScript">
           var a,b,sum,sub,mul,div ;
           do{
            alert("1.Add\n 2.sub\n 3.mul\n 4.div\n")
            var choice = eval(prompt("enter your choice"))
            switch(choice){
                case 1: a = eval(prompt("enter the value of a "))
                b = eval(prompt("enter the value of b"))
                sum = a+b;
                alert("sum is "+sum)
                break;

                case 2: a = eval(prompt("enter the value of a "))
                b = eval(prompt("enter the value of b"))
                sub = a-b;
                alert("sub is "+sub)
                break;

                case 3: a = eval(prompt("enter the value of a "))
                b = eval(prompt("enter the value of b"))
                mul = a*b;
                alert("mul is "+mul)
                break;

                case 4: a = eval(prompt("enter the value of a "))
                b = eval(prompt("enter the value of b"))
                div = a+b;
                alert("div is "+div)
                break;

                default : alert("wrong choice")
                
            }
            var con = confirm("do you want to continue?")
           
           } while(con);

           alert("thank you")

        // do{
        //      var condition = confirm("do you want to continue? ")
        // }while(condition)

    </script>
</body>
</html>
