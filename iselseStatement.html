<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script type="text/JavaScript">
        var m1 = 90;
        var m2 = 80;
        var m3 = 70;
        var sum = m1+m2+m3;
        var avg = sum/3;

        if(avg >90){
            document.write("Grade A+")
        }
        else if(avg >=80){
            document.write("Grade A")
        }
        else if(avg >=70){
            document.write("Grade B")
        }
        else{
            document.write("Grade c")
        }
    </script>
</body>
</html>
